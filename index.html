<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#20232a">
  <title>我的旅行行程</title>
  
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22%E6%88%91%E7%9A%84%E6%97%85%E8%A1%8C%E8%A1%8C%E7%A8%8B%E8%A6%8F%E5%8A%83%E5%99%A8%22,
    %22short_name%22:%22Trip%20Planner%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%2320232a%22,
    %22theme_color%22:%22%2320232a%22,
    %22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/1041/1041916.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]
  }">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #4dd0ff;
      --accent: #21c1ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #2a2f3a 0, #0b0c10 55%, #050608 100%);
      color: #f5f5f7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Glassmorphism Header */
    .app-header {
      padding: 10px 14px;
      padding-top: 14px;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Upload 區塊 */
    .upload {
      padding: 12px 16px;
      background: rgba(15, 15, 22, 0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    button {
      border: none;
      border-radius: 9px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #0b0c10;
      background: linear-gradient(135deg, #4dd0ff, #21c1ef);
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      min-width: 36px;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }

    /* Day Tabs */
    .day-tabs {
      display: flex;
      overflow-x: auto;
      background: rgba(15, 15, 22, 0.9);
      padding: 10px 8px;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      scrollbar-width: none;
    }
    .day-tab {
      flex: 0 0 auto;
      padding: 8px 18px;
      background: rgba(255,255,255,0.08);
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      color: #f5f5f7;
      transition: all 0.3s;
    }
    .day-tab.active {
      background: linear-gradient(135deg, #4dd0ff, #21c1ef);
      color: #0b0c10;
      box-shadow: 0 4px 12px rgba(77,208,255,0.3);
    }

    /* Timeline Container */
    .timeline-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 80px;
    }
    .day-section {
      margin-bottom: 32px;
    }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 10px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #f5f5f7;
    }
    .day-total {
      margin-left: auto;
      color: #4ade80;
      font-size: 1.05rem;
    }

    .add-event-btn {
      background: linear-gradient(135deg, #4dd0ff, #21c1ef);
      color: #0b0c10;
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.95rem;
      margin: 0 0 20px;
      width: 100%;
    }

    /* Event Card - 毛玻璃風格 */
    .event {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
    }
    .event::before {
      content: '';
      position: absolute;
      left: 19px;
      top: 38px;
      bottom: -20px;
      width: 3px;
      background: linear-gradient(#4dd0ff, #21c1ef);
      z-index: 0;
    }
    .event:last-child::before { display: none; }

    .time-dot {
      width: 42px;
      text-align: center;
      flex-shrink: 0;
      z-index: 1;
    }
    .time {
      font-size: 0.95rem;
      font-weight: 700;
      color: #aaa;
      display: block;
    }
    .dot {
      width: 38px;
      height: 38px;
      background: rgba(15,15,22,0.95);
      border: 4px solid #4dd0ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #4dd0ff;
      margin: 6px auto;
      box-shadow: 0 4px 12px rgba(77,208,255,0.25);
    }

    .event-card {
      flex: 1;
      background: rgba(15, 15, 22, 0.92);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.6);
      position: relative;
      backdrop-filter: blur(12px);
    }
    .edit-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 1.35rem;
      cursor: pointer;
      color: #aaa;
      z-index: 2;
    }
    .event-card h3 {
      margin: 0 0 6px;
      font-size: 1.22rem;
      font-weight: 700;
      color: #f5f5f7;
    }
    .event-card small {
      color: #aaa;
      line-height: 1.5;
      display: block;
    }
    .transport {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.9rem;
    }
    .nav-btn {
      margin-top: 14px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0b0c10;
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 1rem;
      width: 100%;
    }

    /* Modal - 毛玻璃版 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(14px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: rgba(15,15,22,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      width: 92%;
      max-width: 380px;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.7);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal h2 {
      margin: 0 0 16px;
      font-size: 1.3rem;
      color: var(--primary);
      text-align: center;
    }
    .modal label {
      display: block;
      margin: 14px 0 5px;
      font-size: 0.95rem;
      color: #aaa;
      font-weight: 500;
    }
    .modal input, .modal textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 1rem;
      background: rgba(255,255,255,0.05);
      color: #f5f5f7;
    }
    .modal textarea { min-height: 80px; resize: vertical; }
    .modal-buttons {
      margin-top: 24px;
      display: flex;
      gap: 10px;
    }
    .modal-buttons button {
      flex: 1;
      padding: 13px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      cursor: pointer;
    }
    .cancel-btn { background: rgba(255,255,255,0.15); color: #f5f5f7; }
    .delete-btn { background: #ff5722; color: white; }
    .save-btn { background: linear-gradient(135deg, #4dd0ff, #21c1ef); color: #0b0c10; }

    a.link {
      color: #4dd0ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="app-header">
    <div onclick="history.back()" style="cursor:pointer; font-size:1.4rem;">←</div>
    <h1>我的旅行行程</h1>
    <div style="font-size:1.4rem; opacity:0.8;">❔ ✏️ 🔗</div>
  </div>

  <div class="upload">
    <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none;">
    <button onclick="document.getElementById('fileInput').click()">📤 上傳 Excel / CSV</button>
    <button onclick="loadSampleData()">📋 載入馬來西亞 5 天範例</button>
    <button onclick="exportCSV()">📥 匯出 CSV</button>
    <button onclick="window.print()">📄 列印 / 匯出 PDF</button>
    <button onclick="clearData()" style="background:#f44336;">🗑️ 清除所有資料</button>
  </div>

  <div id="dayTabs" class="day-tabs"></div>
  <div id="timelineContainer" class="timeline-container"></div>

  <!-- 編輯 Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>✏️ 編輯行程</h2>
      <label>日期</label>
      <input type="text" id="edit-date">
      <label>時間</label>
      <input type="text" id="edit-time">
      <label>地點</label>
      <input type="text" id="edit-location">
      <label>營業時間</label>
      <input type="text" id="edit-hours">
      <label>費用 ($$)</label>
      <input type="text" id="edit-cost">
      <label>交通方式</label>
      <input type="text" id="edit-transport">
      <label>重點 / 備註</label>
      <textarea id="edit-note" rows="3"></textarea>
      <div class="modal-buttons">
        <button onclick="hideModal()" class="cancel-btn">取消</button>
        <button onclick="deleteCurrentEvent()" class="delete-btn">🗑️ 刪除</button>
        <button onclick="saveEdit()" class="save-btn">💾 儲存</button>
      </div>
    </div>
  </div>

  <script>
    let trips = [];
    let currentEditIndex = -1;

    function formatTime(val) {
      if (!val) return '';
      if (typeof val === 'number') {
        const hours = Math.floor(val * 24);
        const minutes = Math.round((val * 24 - hours) * 60);
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
      }
      return String(val).trim();
    }

    function makeLink(text) {
      if (!text) return '';
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, match => `<a href="${match}" target="_blank" class="link">🔗 點擊開啟連結</a>`);
    }

    function extractCost(val) {
      if (!val) return 0;
      const str = String(val).toUpperCase().replace(/RM| |\$/g, '').trim();
      const matches = str.match(/\d+\.?\d*/g);
      if (!matches) return 0;
      const nums = matches.map(Number);
      return nums.length === 1 ? nums[0] : (nums[0] + nums[nums.length-1]) / 2;
    }

    function getTransportMode(transport) {
      const t = (transport || '').toLowerCase();
      if (t.includes('grab') || t.includes('車') || t.includes('taxi')) return '🚕';
      if (t.includes('mrt') || t.includes('ets') || t.includes('bus') || t.includes('渡輪')) return '🚇';
      return '🚶';
    }

    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          if (file.name.endsWith('.xlsx')) {
            const data = new Uint8Array(ev.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            let raw = XLSX.utils.sheet_to_json(sheet);
            let currentDate = '';
            raw.forEach(row => {
              if (row['日期'] && String(row['日期']).trim() !== '') currentDate = String(row['日期']).trim();
              else if (currentDate) row['日期'] = currentDate;
            });
            trips = raw.filter(r => r['時間'] || r['地點']);
          } else {
            trips = parseCSV(ev.target.result);
          }
          localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
          renderAll();
        } catch(err) { alert('讀取失敗，請確認檔案格式'); }
      };
      reader.readAsArrayBuffer ? reader.readAsArrayBuffer(file) : reader.readAsText(file);
    });

    function parseCSV(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const obj = {};
        headers.forEach((h,i) => obj[h] = (values[i] || '').replace(/^"|"$/g,'').trim());
        return obj;
      });
    }

    function showEditModal(index) {
      currentEditIndex = index;
      const item = trips[index];
      document.getElementById('edit-date').value = item['日期'] || '';
      document.getElementById('edit-time').value = item['時間'] || '';
      document.getElementById('edit-location').value = item['地點'] || '';
      document.getElementById('edit-hours').value = item['營業時間'] || '';
      document.getElementById('edit-cost').value = item['$$'] || '';
      document.getElementById('edit-transport').value = item['交通'] || '';
      document.getElementById('edit-note').value = item['重點'] || '';
      document.getElementById('editModal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function saveEdit() {
      if (currentEditIndex === -1) return;
      trips[currentEditIndex] = {
        ...trips[currentEditIndex],
        '日期': document.getElementById('edit-date').value,
        '時間': document.getElementById('edit-time').value,
        '地點': document.getElementById('edit-location').value,
        '營業時間': document.getElementById('edit-hours').value,
        '$$': document.getElementById('edit-cost').value,
        '交通': document.getElementById('edit-transport').value,
        '重點': document.getElementById('edit-note').value
      };
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      hideModal();
      renderAll();
    }

    function deleteCurrentEvent() {
      if (currentEditIndex === -1) return;
      if (confirm('確定要刪除這個行程嗎？')) {
        trips.splice(currentEditIndex, 1);
        localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
        hideModal();
        renderAll();
      }
    }

    function renderAll() {
      renderDayTabs();
      renderTimeline();
    }

    function renderDayTabs() {
      const tabsContainer = document.getElementById('dayTabs');
      tabsContainer.innerHTML = '';
      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      Object.keys(grouped).sort().forEach(date => {
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');
        const tab = document.createElement('div');
        tab.className = 'day-tab';
        tab.textContent = date;
        tab.dataset.dayId = dayId;
        tab.onclick = () => {
          document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const target = document.getElementById(dayId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        tabsContainer.appendChild(tab);
      });
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      container.innerHTML = '';

      const grouped = {};
      trips.forEach(row => {
        const date = row['日期'] || '未分類';
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(row);
      });

      let globalIdx = 0;

      Object.keys(grouped).sort().forEach(date => {
        const dayTrips = grouped[date];
        const dayTotal = dayTrips.reduce((sum, r) => sum + extractCost(r['$$']), 0);
        const dayId = 'day-' + date.replace(/[^a-zA-Z0-9]/g, '');

        let html = `
          <div class="day-section" id="${dayId}">
            <div class="day-header">
              ${date}
              <span class="day-total">小計 RM ${dayTotal.toFixed(0)}</span>
            </div>
            <button class="add-event-btn" onclick="addNewEvent('${date}')">＋ 新增此天活動</button>`;

        dayTrips.forEach(r => {
          const costNum = extractCost(r['$$']);
          const currentLoc = r['地點'] || '';
          const modeIcon = getTransportMode(r['交通']);
          const encodedCurrent = encodeURIComponent(currentLoc);
          const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodedCurrent}`;

          html += `
            <div class="event">
              <div class="time-dot">
                <div class="time">${formatTime(r['時間'])}</div>
                <div class="dot">${globalIdx + 1}</div>
              </div>
              <div class="event-card">
                <span onclick="showEditModal(${globalIdx})" class="edit-icon">✏️</span>
                <h3>${currentLoc}</h3>
                <small>
                  營業時間：${r['營業時間'] || '—'}<br>
                  費用：${r['$$'] || '—'} （計算 RM ${costNum.toFixed(0)}）<br>
                  重點：${makeLink(r['重點'] || '')}
                </small>
                <div class="transport">
                  ${modeIcon} ${r['交通'] || '—'}
                </div>
                <button class="nav-btn" onclick="window.open('${mapUrl}','_blank')">🗺️ 導航到此地點</button>
              </div>
            </div>`;
          globalIdx++;
        });

        html += `</div>`;
        container.innerHTML += html;
      });
    }

    function addNewEvent(defaultDate) {
      const newEvent = {
        '日期': defaultDate,
        '時間': '10:00',
        '地點': '新地點',
        '營業時間': '全天',
        '$$': 'RM 0',
        '交通': 'Walking',
        '重點': ''
      };
      trips.push(newEvent);
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      renderAll();
      showEditModal(trips.length - 1);
    }

    function exportCSV() {
      if (trips.length === 0) return alert('沒有資料');
      let csv = '日期,時間,地點,營業時間,$$,交通,重點\n';
      trips.forEach(r => {
        csv += `"${r['日期']||''}","${r['時間']||''}","${r['地點']||''}","${r['營業時間']||''}","${r['$$']||''}","${r['交通']||''}","${r['重點']||''}"\n`;
      });
      const blob = new Blob([csv], {type:'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'My-Trip.csv';
      a.click();
    }

    function clearData() {
      if (confirm('確定清除所有資料？')) {
        localStorage.removeItem('malaysiaTrips');
        trips = [];
        renderAll();
      }
    }

    function loadSampleData() {
      trips = [
        {"日期":"2026/04/05 (Day 1)","時間":"09:30","地點":"吉隆坡國際機場 (KLIA)","營業時間":"全天","$$":"RM 0","交通":"KLIA Ekspres","重點":"抵達馬來西亞"},
        {"日期":"2026/04/05 (Day 1)","時間":"11:00","地點":"Bukit Bintang 酒店區","營業時間":"全天","$$":"RM 180","交通":"Grab","重點":"Check-in + 午餐"},
        {"日期":"2026/04/05 (Day 1)","時間":"14:00","地點":"中央市場 (Pasar Seni)","營業時間":"10:00-22:00","$$":"RM 45","交通":"Walking","重點":"手工藝品"},
        {"日期":"2026/04/05 (Day 1)","時間":"18:30","地點":"Jalan Alor 美食街","營業時間":"17:00-00:00","$$":"RM 85","交通":"Grab","重點":"街頭美食"}
      ];
      localStorage.setItem('malaysiaTrips', JSON.stringify(trips));
      renderAll();
      alert("✅ 已載入馬來西亞 5 天經典範例！\n\n每張卡片右上角 ✏️ 可編輯～");
    }

    window.onload = () => {
      const saved = localStorage.getItem('malaysiaTrips');
      if (saved) trips = JSON.parse(saved);
      renderAll();
    };
  </script>
</body>
</html>
